<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAX — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Syne',sans-serif}
body{background:#070B14;color:#F0F6FF;display:flex;align-items:center;justify-content:center;min-height:100vh;overflow:hidden;position:relative}
.grid{position:fixed;inset:0;z-index:0;background-image:linear-gradient(rgba(0,229,204,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,204,.04) 1px,transparent 1px);background-size:56px 56px}
.orb{position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none;z-index:0}
.o1{width:520px;height:520px;background:rgba(245,197,24,.07);top:-160px;right:-120px;animation:f1 9s ease-in-out infinite}
.o2{width:420px;height:420px;background:rgba(0,229,204,.06);bottom:-120px;left:-100px;animation:f2 11s ease-in-out infinite}
.o3{width:300px;height:300px;background:rgba(155,89,255,.05);top:50%;left:50%;transform:translate(-50%,-50%);animation:pulse 7s ease-in-out infinite}
@keyframes f1{0%,100%{transform:translateY(0)}50%{transform:translateY(28px)}}
@keyframes f2{0%,100%{transform:translateY(0)}50%{transform:translateY(-24px)}}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
.scanline{position:fixed;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,#00E5CC,transparent);z-index:20;animation:scan 4s linear infinite}
@keyframes scan{0%{top:0;opacity:1}95%{top:100vh;opacity:.3}100%{top:0;opacity:0}}
.wrap{position:relative;z-index:10;width:100%;max-width:440px;padding:20px;animation:up .7s cubic-bezier(.16,1,.3,1) both}
@keyframes up{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.brand{text-align:center;margin-bottom:28px}
.brand-name{font-size:80px;font-weight:800;letter-spacing:-5px;line-height:1;background:linear-gradient(135deg,#F5C518 0%,#fff 55%,#00E5CC 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 40px rgba(245,197,24,.35))}
.brand-sub{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:4px;color:#3D566E;margin-top:2px;text-transform:uppercase}
.brand-badge{display:inline-block;margin-top:10px;padding:3px 12px;border-radius:20px;background:rgba(245,197,24,.1);border:1px solid rgba(245,197,24,.25);font-size:11px;color:#F5C518;font-family:'JetBrains Mono',monospace;letter-spacing:1px}
.card{background:rgba(12,18,32,.9);border:1px solid #1E3054;border-radius:20px;padding:32px;backdrop-filter:blur(24px);box-shadow:0 0 0 1px rgba(255,255,255,.03) inset,0 40px 80px rgba(0,0,0,.5)}
.tabs{display:flex;border-bottom:1px solid #1E3054;margin-bottom:26px}
.tab{flex:1;padding:12px;background:transparent;border:none;cursor:pointer;font-family:'Syne',sans-serif;font-size:14px;font-weight:600;color:#3D566E;border-bottom:2px solid transparent;transition:all .2s}
.tab.active{color:#F5C518;border-bottom-color:#F5C518}
.pane{display:none}.pane.active{display:block}
.fl{margin-bottom:16px}
.fl label{display:block;font-size:10px;font-weight:600;color:#3D566E;letter-spacing:2px;text-transform:uppercase;margin-bottom:7px;font-family:'JetBrains Mono',monospace}
.fl input{width:100%;padding:13px 14px;background:#070B14;border:1px solid #1E3054;border-radius:10px;color:#F0F6FF;font-family:'JetBrains Mono',monospace;font-size:14px;outline:none;transition:all .2s}
.fl input:focus{border-color:#00E5CC;box-shadow:0 0 0 3px rgba(0,229,204,.1)}
.fl input::placeholder{color:#3D566E}
.errmsg{font-size:12px;color:#FF5C5C;margin-top:6px;font-family:'JetBrains Mono',monospace;display:none}
.errmsg.show{display:block}
.btn-main{width:100%;padding:14px;background:#F5C518;color:#070B14;border:none;border-radius:10px;font-family:'Syne',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;margin-top:6px}
.btn-main:hover{transform:translateY(-1px);box-shadow:0 8px 28px rgba(245,197,24,.35)}
.btn-main:active{transform:none}
.rem{display:flex;align-items:center;gap:8px;margin:10px 0 14px}
.rem input[type=checkbox]{accent-color:#00E5CC;width:15px;height:15px;cursor:pointer}
.rem label{font-size:12px;color:#8DA4C8;cursor:pointer}
.hint{text-align:center;font-size:11px;color:#3D566E;font-family:'JetBrains Mono',monospace;margin-top:14px}
.hint span{color:#F5C518}
.flash{padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:14px;font-family:'JetBrains Mono',monospace}
.flash.err{background:rgba(255,92,92,.1);border:1px solid rgba(255,92,92,.3);color:#FF5C5C}
</style>
</head>
<body>
<div class="scanline"></div>
<div class="grid"></div>
<div class="orb o1"></div><div class="orb o2"></div><div class="orb o3"></div>
<div class="wrap">
  <div class="brand">
    <div class="brand-name">MAX</div>
    <div class="brand-sub">Personal Intelligence System</div>
    <div class="brand-badge">v2.0 — Flask + Voice + AI</div>
  </div>
  <div class="card">
    {% if error %}<div class="flash err">{{ error }}</div>{% endif %}
    <div class="tabs">
      <button class="tab active" onclick="sw('login',this)">Sign In</button>
      <button class="tab" onclick="sw('register',this)">Register</button>
    </div>
    <div class="pane active" id="pane-login">
      <form method="POST" action="/login">
        <div class="fl"><label>Username</label><input name="username" placeholder="rushindhra" autocomplete="username" required></div>
        <div class="fl"><label>Password</label><input name="password" type="password" placeholder="••••••••" autocomplete="current-password" required></div>
        <div class="rem"><input type="checkbox" name="remember" id="rem"><label for="rem">Remember me</label></div>
        <button class="btn-main" type="submit">Sign In →</button>
      </form>
      <div class="hint" style="margin-top:16px">Demo: <span>rushindhra</span> / <span>max123</span></div>
    </div>
    <div class="pane" id="pane-register">
      <form method="POST" action="/register">
        <div class="fl"><label>Username</label><input name="username" placeholder="your_username" autocomplete="username" required></div>
        <div class="fl"><label>Display Name</label><input name="display_name" placeholder="Rushindhra"></div>
        <div class="fl"><label>Email</label><input name="email" type="email" placeholder="you@email.com" required></div>
        <div class="fl"><label>Password</label><input name="password" id="rp" type="password" placeholder="Min. 6 characters" required></div>
        <div class="fl"><label>Confirm Password</label><input name="confirm" id="rp2" type="password" placeholder="Repeat password" required></div>
        <div class="errmsg" id="rerr"></div>
        <button class="btn-main" type="button" onclick="doReg()">Create Account →</button>
      </form>
    </div>
  </div>
</div>
<script>
function sw(name,btn){document.querySelectorAll('.pane').forEach(p=>p.classList.remove('active'));document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));document.getElementById('pane-'+name).classList.add('active');btn.classList.add('active')}
function doReg(){const p=document.getElementById('rp').value,p2=document.getElementById('rp2').value,e=document.getElementById('rerr');if(p!==p2){e.textContent='Passwords do not match.';e.classList.add('show');return}if(p.length<6){e.textContent='Password must be 6+ characters.';e.classList.add('show');return}document.querySelector('#pane-register form').submit()}
</script>
</body>
</html>
